<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MAYKI UC BOT 24/7 VIP</title>
  <meta name="theme-color" content="#080608" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/mayki-logo.jpeg" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app" class="app-shell">
    <div class="loader-screen" id="loader">
      <div class="loader-orb"><span></span><span></span><span></span><span></span></div>
      <p>MAYKI UC SHOP 24/7</p>
    </div>

    <header class="hero-header">
      <div class="brand-row">
        <img src="/assets/mayki-logo.jpeg" class="brand-avatar" alt="MAYKI logo" />
        <div>
          <h1 id="brandTitle">MAYKI UC BOT</h1>
          <p id="brandSubtitle">Игровой магазин</p>
        </div>
        <button class="profile-mini" data-route="profile" aria-label="Profile">
          <span>♙</span>
        </button>
      </div>
      <div class="hero-card">
        <div class="hero-glow"></div>
        <div class="hero-copy">
          <small>UC BOT 24/7 VIP</small>
          <h2>MAYKI</h2>
          <p>Premium PUBG Mobile Store</p>
        </div>
      </div>
    </header>

    <main id="main"></main>

    <nav class="dock" id="dock">
      <button data-route="home" class="active">⌂<span data-i18n="home">Главная</span></button>
      <button data-route="pubg">UC<span>PUBG</span></button>
      <button data-route="prime">★<span>Prime+</span></button>
      <button data-route="profile">♙<span data-i18n="profile">Профиль</span></button>
    </nav>

    <div class="floating-actions">
      <a class="float-btn" id="supportBtn" target="_blank" rel="noopener">🎧<span>Поддержка</span></a>
      <a class="float-btn" id="channelBtn" target="_blank" rel="noopener">📢<span>Канал</span></a>
      <button class="float-btn" data-route="profile">♙<span>Профиль</span></button>
    </div>

    <div class="toast" id="toast"></div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
